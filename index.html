<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#141414">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Claude Usage">
<title>Claude Usage</title>
<style>
  :root{
    --bg:#141414; --card:#1f1f1f; --card2:#262626;
    --txt:#ededed; --muted:#9a9a9a; --faint:#6e6e6e;
    --line:#2e2e2e; --track:#ffffff14;
    --blue:#2f81f7; --green:#2ea043; --amber:#e3a008; --red:#f04438;
    --r:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue","Sukhumvit Set","Noto Sans Thai",sans-serif;
    -webkit-font-smoothing:antialiased}
  body{max-width:480px;margin:0 auto;padding:max(16px,env(safe-area-inset-top)) 16px calc(28px + env(safe-area-inset-bottom))}
  .top{display:flex;align-items:center;justify-content:space-between;padding:8px 2px 18px}
  .brand{display:flex;align-items:center;gap:10px}
  .logo{width:30px;height:30px;border-radius:8px;background:#d97757;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:16px}
  .brand h1{font-size:18px;font-weight:600;letter-spacing:.2px}
  .brand p{font-size:11px;color:var(--faint);margin-top:1px}
  .refresh{width:38px;height:38px;border-radius:50%;background:var(--card);border:1px solid var(--line);
    color:var(--muted);font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .refresh:active{transform:scale(.92)}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px 18px 16px;margin-bottom:14px}
  .c-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:14px}
  .c-name{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:600}
  .c-ico{width:30px;height:30px;border-radius:9px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:16px}
  .c-edit{background:none;border:none;color:var(--faint);font-size:18px;padding:4px;cursor:pointer;line-height:1}
  .c-edit:active{color:var(--txt)}

  .big{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
  .big .pct{font-size:34px;font-weight:700;line-height:1}
  .big .of{font-size:13px;color:var(--muted)}
  .sub{font-size:12.5px;color:var(--muted);margin-bottom:13px}
  .sub b{color:var(--txt);font-weight:600}

  .bar{height:10px;background:var(--track);border-radius:8px;overflow:hidden}
  .fill{height:100%;border-radius:8px;transition:width .5s ease}
  .meta{display:flex;align-items:center;justify-content:space-between;margin-top:11px;font-size:12px}
  .reset{color:var(--muted);display:flex;align-items:center;gap:6px}
  .reset .dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
  .countdown{font-variant-numeric:tabular-nums;color:var(--txt);font-weight:600}

  .edit{margin-top:14px;padding-top:14px;border-top:1px solid var(--line);display:none}
  .edit.open{display:block}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:11.5px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
  .field input,.field select{width:100%;height:46px;background:var(--card2);border:1px solid var(--line);
    border-radius:11px;color:var(--txt);font-size:16px;padding:0 14px;font-family:inherit}
  .field input:focus,.field select:focus{outline:none;border-color:var(--blue)}
  .erow{display:flex;gap:10px}
  .erow .field{flex:1}
  .ebtns{display:flex;gap:10px;margin-top:4px}
  .ebtns button{flex:1;height:46px;border-radius:11px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid var(--line)}
  .b-save{background:var(--blue);color:#fff;border-color:var(--blue)}
  .b-cancel{background:transparent;color:var(--muted)}
  .b-save:active,.b-cancel:active{transform:scale(.98)}

  .foot{text-align:center;color:var(--faint);font-size:11px;line-height:1.7;margin-top:6px;padding:0 8px}
  .updated{text-align:center;color:var(--faint);font-size:11.5px;margin:2px 0 16px}
</style>
</head>
<body>

<div class="top">
  <div class="brand">
    <div class="logo">✳</div>
    <div>
      <h1>Claude Usage</h1>
      <p id="now"></p>
    </div>
  </div>
  <button class="refresh" id="refresh" aria-label="รีเฟรช">↻</button>
</div>

<div class="updated" id="updated"></div>

<div id="cards"></div>

<p class="foot">
  แตะไอคอนดินสอเพื่ออัปเดตตัวเลขจากแอป Claude · ค่าจะถูกจำไว้ในเครื่อง<br>
  เวลานับถอยหลังถึง reset คำนวณอัตโนมัติ และจะรีเซ็ต % ให้เองเมื่อถึงเวลา
</p>

<script>
const KEY='claudeUsageV1';
const DEFAULT={
  context:{ usedK:83 },
  fiveHour:{ pct:30, time:'20:40', next:null },
  weekly:{ pct:63, day:1, time:'22:00', next:null }
};
let S=load();

function load(){
  try{ const r=JSON.parse(localStorage.getItem(KEY)); if(r) return Object.assign({},DEFAULT,r,{updated:r.updated}); }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT));
}
function save(){ S.updated=Date.now(); localStorage.setItem(KEY,JSON.stringify(S)); }

function next5h(time){
  const [h,m]=time.split(':').map(Number);
  const now=new Date(), t=new Date(); t.setHours(h,m,0,0);
  if(t<=now) t.setDate(t.getDate()+1);
  return t.getTime();
}
function nextWeekly(day,time){
  const [h,m]=time.split(':').map(Number);
  const now=new Date(), t=new Date(); t.setHours(h,m,0,0);
  let diff=(day - t.getDay()+7)%7; t.setDate(t.getDate()+diff);
  if(t<=now) t.setDate(t.getDate()+7);
  return t.getTime();
}
function ensureResets(){
  const now=Date.now();
  if(!S.fiveHour.next || now>=S.fiveHour.next){
    if(S.fiveHour.next && now>=S.fiveHour.next) S.fiveHour.pct=0;
    S.fiveHour.next=next5h(S.fiveHour.time);
  }
  if(!S.weekly.next || now>=S.weekly.next){
    if(S.weekly.next && now>=S.weekly.next) S.weekly.pct=0;
    S.weekly.next=nextWeekly(S.weekly.day,S.weekly.time);
  }
}
function fmtLeft(ms){
  if(ms<0)ms=0;
  const s=Math.floor(ms/1000), d=Math.floor(s/86400), h=Math.floor(s%86400/3600),
        m=Math.floor(s%3600/60), sec=s%60;
  if(d>0) return d+' วัน '+h+' ชม.';
  if(h>0) return h+' ชม. '+m+' นาที';
  if(m>0) return m+' นาที '+sec+' วิ';
  return sec+' วิ';
}
function colorFor(p){ return p>=90?'var(--red)':p>=75?'var(--amber)':'var(--blue)'; }
const DAYS=['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์'];

function render(){
  ensureResets();
  const ctxPct=Math.round(S.context.usedK/10);
  const ctxLeft=(1000-S.context.usedK);
  const ctxLeftTxt=ctxLeft>=1000?'1.0M':(Math.round(ctxLeft)+'k');
  const usedTxt=S.context.usedK>=1000?'1.0M':(S.context.usedK.toFixed(S.context.usedK%1?1:0)+'k');

  const cards=[
    {id:'context',ico:'❑',name:'Context window',pct:ctxPct,
      big:usedTxt,of:'/ 1.0M',
      sub:'เหลือ <b>'+ctxLeftTxt+'</b> ('+(100-ctxPct)+'%)',
      reset:null},
    {id:'fiveHour',ico:'◷',name:'5-hour limit',pct:S.fiveHour.pct,
      big:S.fiveHour.pct+'%',of:'ใช้ไป',
      sub:'เหลือ <b>'+(100-S.fiveHour.pct)+'%</b> ก่อนถึงลิมิต',
      reset:'5h'},
    {id:'weekly',ico:'▦',name:'Weekly · all models',pct:S.weekly.pct,
      big:S.weekly.pct+'%',of:'ใช้ไป',
      sub:'เหลือ <b>'+(100-S.weekly.pct)+'%</b> ก่อนถึงลิมิต',
      reset:'wk'}
  ];

  document.getElementById('cards').innerHTML=cards.map(c=>{
    const col=colorFor(c.pct);
    let meta='';
    if(c.reset==='5h'){
      meta='<div class="meta"><span class="reset"><span class="dot"></span>Resets '+to12(S.fiveHour.time)+'</span>'+
        '<span class="countdown" data-cd="fiveHour">—</span></div>';
    }else if(c.reset==='wk'){
      meta='<div class="meta"><span class="reset"><span class="dot"></span>Resets '+DAYS[S.weekly.day]+' '+to12(S.weekly.time)+'</span>'+
        '<span class="countdown" data-cd="weekly">—</span></div>';
    }
    return '<div class="card" data-card="'+c.id+'">'+
      '<div class="c-head"><div class="c-name"><span class="c-ico">'+c.ico+'</span>'+c.name+'</div>'+
        '<button class="c-edit" data-edit="'+c.id+'" aria-label="แก้ไข">✎</button></div>'+
      '<div class="big"><span class="pct">'+c.big+'</span><span class="of">'+c.of+'</span></div>'+
      '<div class="sub">'+c.sub+'</div>'+
      '<div class="bar"><div class="fill" style="width:'+Math.min(c.pct,100)+'%;background:'+col+'"></div></div>'+
      meta+
      '<div class="edit" data-form="'+c.id+'">'+formHTML(c.id)+'</div>'+
    '</div>';
  }).join('');

  bind();
  tick();
  const u=S.updated?('อัปเดตล่าสุด '+new Date(S.updated).toLocaleString('th-TH',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})):'ยังไม่เคยอัปเดต — แตะดินสอเพื่อกรอกค่า';
  document.getElementById('updated').textContent=u;
}

function to12(t){
  let [h,m]=t.split(':').map(Number);
  const ap=h>=12?'PM':'AM'; h=h%12||12;
  return h+':'+String(m).padStart(2,'0')+' '+ap;
}

function formHTML(id){
  if(id==='context'){
    return '<div class="field"><label>Context ใช้ไป (k tokens) — เช่น 83</label>'+
      '<input type="number" inputmode="decimal" step="0.1" min="0" max="1000" id="f-ctx" value="'+S.context.usedK+'"></div>'+
      btns(id);
  }
  if(id==='fiveHour'){
    return '<div class="erow"><div class="field"><label>ใช้ไป %</label>'+
      '<input type="number" inputmode="numeric" min="0" max="100" id="f-5p" value="'+S.fiveHour.pct+'"></div>'+
      '<div class="field"><label>เวลา reset</label><input type="time" id="f-5t" value="'+S.fiveHour.time+'"></div></div>'+
      btns(id);
  }
  return '<div class="erow"><div class="field"><label>ใช้ไป %</label>'+
    '<input type="number" inputmode="numeric" min="0" max="100" id="f-wp" value="'+S.weekly.pct+'"></div>'+
    '<div class="field"><label>เวลา reset</label><input type="time" id="f-wt" value="'+S.weekly.time+'"></div></div>'+
    '<div class="field"><label>วัน reset</label><select id="f-wd">'+
      DAYS.map((d,i)=>'<option value="'+i+'"'+(i===S.weekly.day?' selected':'')+'>'+d+'</option>').join('')+
    '</select></div>'+btns(id);
}
function btns(id){
  return '<div class="ebtns"><button class="b-cancel" data-cancel="'+id+'">ยกเลิก</button>'+
    '<button class="b-save" data-save="'+id+'">บันทึก</button></div>';
}

function bind(){
  document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>{
    const id=b.dataset.edit, f=document.querySelector('[data-form="'+id+'"]');
    document.querySelectorAll('.edit').forEach(e=>{if(e!==f)e.classList.remove('open')});
    f.classList.toggle('open');
  });
  document.querySelectorAll('[data-cancel]').forEach(b=>b.onclick=()=>render());
  document.querySelectorAll('[data-save]').forEach(b=>b.onclick=()=>{
    const id=b.dataset.save;
    if(id==='context'){
      S.context.usedK=clamp(parseFloat(document.getElementById('f-ctx').value)||0,0,1000);
    }else if(id==='fiveHour'){
      S.fiveHour.pct=clamp(parseInt(document.getElementById('f-5p').value)||0,0,100);
      S.fiveHour.time=document.getElementById('f-5t').value||'20:40';
      S.fiveHour.next=next5h(S.fiveHour.time);
    }else{
      S.weekly.pct=clamp(parseInt(document.getElementById('f-wp').value)||0,0,100);
      S.weekly.time=document.getElementById('f-wt').value||'22:00';
      S.weekly.day=parseInt(document.getElementById('f-wd').value);
      S.weekly.next=nextWeekly(S.weekly.day,S.weekly.time);
    }
    save(); render();
  });
}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

function tick(){
  const now=Date.now();
  let reset=false;
  if(now>=S.fiveHour.next){S.fiveHour.pct=0;S.fiveHour.next=next5h(S.fiveHour.time);reset=true;}
  if(now>=S.weekly.next){S.weekly.pct=0;S.weekly.next=nextWeekly(S.weekly.day,S.weekly.time);reset=true;}
  if(reset){save();render();return;}
  const e5=document.querySelector('[data-cd="fiveHour"]'); if(e5)e5.textContent='ใน '+fmtLeft(S.fiveHour.next-now);
  const ew=document.querySelector('[data-cd="weekly"]'); if(ew)ew.textContent='ใน '+fmtLeft(S.weekly.next-now);
  document.getElementById('now').textContent=new Date().toLocaleString('th-TH',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
}

document.getElementById('refresh').onclick=()=>{ render(); };
render();
setInterval(tick,1000);
</script>
</body>
</html>
